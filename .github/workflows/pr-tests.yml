name: PR Tests

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Fitness-Tracker.sln

      - name: Build
        run: dotnet build Fitness-Tracker.sln --no-restore

      - name: Test
        run: dotnet test Fitness-Tracker.sln --no-build --verbosity normal
